<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RepoRadar Dashboard</title>
  <meta name="description" content="Live repo discovery dashboard with local vault settings, AI notes, charts, and cached catalog history.">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/index.html">
      <span class="brand-mark">RR</span>
      <span>
        <strong class="brand-name">RepoRadar</strong>
      </span>
    </a>
    <nav class="main-nav">
      <a class="nav-link active" href="/index.html">Dash</a>
      <a class="nav-link" href="/repositories.html">Repos</a>
      <a class="nav-link" href="/catalog.html">Log</a>
      <a class="nav-link" href="/settings.html">Set</a>
    </nav>
    <div class="topbar-actions">
      <div class="status-pill" id="syncStatus">Ready</div>
      <button class="btn btn-strong" id="refreshBtn" type="button">Refresh</button>
    </div>
  </header>

  <main class="app-shell">
    <aside class="left-rail">
      <section class="panel">
        <p class="panel-kicker">Quick Views</p>
        <div class="stack-actions">
          <button class="rail-action active" data-view="all" type="button">All <span id="allCount">0</span></button>
          <button class="rail-action" data-view="saved" type="button">Saved <span id="savedCount">0</span></button>
          <button class="rail-action" data-view="money" type="button">Money <span id="moneyCount">0</span></button>
        </div>
      </section>

      <section class="panel">
        <p class="panel-kicker">Top Movers</p>
        <div id="trendingList" class="feed-list"></div>
      </section>
    </aside>

    <section class="content-column">
      <section class="stats-row">
        <article class="stat-card">
          <span class="stat-value" id="statItems">0</span>
          <span class="stat-label">Live</span>
        </article>
        <article class="stat-card">
          <span class="stat-value" id="statCatalog">0</span>
          <span class="stat-label">Total</span>
        </article>
        <article class="stat-card">
          <span class="stat-value" id="statSources">0</span>
          <span class="stat-label">Sources</span>
        </article>
        <article class="stat-card">
          <span class="stat-value" id="statAnalyzed">0</span>
          <span class="stat-label">AI Notes</span>
        </article>
        <article class="stat-card">
          <span class="stat-value" id="statNew">0</span>
          <span class="stat-label">New</span>
        </article>
      </section>

      <section class="chart-row">
        <article class="panel">
          <p class="panel-kicker">Source Mix</p>
          <div id="sourceChart" class="chart-host"></div>
        </article>
        <article class="panel">
          <p class="panel-kicker">Sync History</p>
          <div id="historyChart" class="chart-host"></div>
        </article>
      </section>

      <section class="panel">
        <div class="panel-head">
          <p class="panel-kicker">Recent Arrivals</p>
          <a href="/repositories.html" class="btn">View all repositories</a>
        </div>
        <div id="liveFeed" class="feed-list"></div>
      </section>
    </section>

    <aside class="right-rail">
      <section class="panel">
        <p class="panel-kicker">System State</p>
        <dl class="meta-list">
          <div><dt>AI</dt><dd id="aiStatus">Ready</dd></div>
          <div><dt>Sync</dt><dd id="lastSyncStatus">Never</dd></div>
        </dl>
      </section>

      <section class="panel">
        <p class="panel-kicker">Source Health</p>
        <div id="sourceHealth" class="feed-list"></div>
      </section>

      <section class="panel">
        <p class="panel-kicker">Auto Mode</p>
        <div class="small-copy" id="automationStatus">Active</div>
      </section>
    </aside>
  </main>

  <script type="module" src="/dashboard.js"></script>
</body>
</html>
