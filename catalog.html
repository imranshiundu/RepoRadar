<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RepoRadar - Audit Log</title>
  <meta name="description" content="Compact audit log for all discovered repositories and sync history.">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="scrollable-page">
  <header class="topbar">
    <a class="brand" href="/index.html">
      <span class="brand-mark">RR</span>
      <strong class="brand-name">RepoRadar</strong>
    </a>
    <nav class="main-nav">
      <a class="nav-link" href="/index.html">Dash</a>
      <a class="nav-link" href="/recents.html">Recents</a>
      <a class="nav-link" href="/repositories.html">Repos</a>
      <a class="nav-link active" href="/catalog.html">Log</a>
      <a class="nav-link" href="/settings.html">Set</a>
    </nav>
    <div class="topbar-actions">
      <div class="status-pill" id="syncStatus">Ready</div>
    </div>
  </header>

  <main class="page-shell">
    <section class="page-header">
      <p class="eyebrow">Audit</p>
      <h1>Discovery Log</h1>
      <p class="hero-copy">Full local history of discovered projects, source coverage, and revisit frequency in a dense table view.</p>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <p class="panel-kicker">History</p>
          <h2 class="panel-title">Catalog Records</h2>
        </div>
        <input class="search-input" id="searchInput" type="search" placeholder="Filter history..." style="max-width: 260px;">
      </div>
      <div id="catalogTableHost"></div>
    </section>
  </main>

  <script type="module" src="/catalog.js"></script>
</body>
</html>
